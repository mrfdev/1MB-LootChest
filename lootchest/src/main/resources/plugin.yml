name: ${project.parent.name}
main: ${project.groupId}.Main
version: ${project.version}-${buildNumber}
author: Black_Eyes
api-version: '26.2'
softdepend: [CMI, CMILib, Multiverse-Core, Bolt]
description: >
             ${project.description}
commands:
  lootchest:
    description: Manage Lootbox containers and view player information
    aliases: lc
    usage: /lc <subcommand>
permissions:
  lootchest.audit:
    description: Run the read-only Lootbox lifecycle consistency audit
    default: op
  lootchest.info:
    description: View Lootbox information and its documentation link
    default: true
  lootchest.admin:
    description: Full Lootbox administration access
    default: op
    children:
      lootchest.*: true
  lootchest.*:
    description: Access every Lootbox administrative command
    default: op
    children:
      lootchest.audit: true
      lootchest.copy: true
      lootchest.create: true
      lootchest.despawn: true
      lootchest.despawnall: true
      lootchest.edit: true
      lootchest.getname: true
      lootchest.give: true
      lootchest.list: true
      lootchest.locate: true
      lootchest.maxfilledslots: true
      lootchest.randomspawn: true
      lootchest.reload: true
      lootchest.remove: true
      lootchest.respawn: true
      lootchest.respawnall: true
      lootchest.setholo: true
      lootchest.setpos: true
      lootchest.setprotection: true
      lootchest.settime: true
      lootchest.tp: true
