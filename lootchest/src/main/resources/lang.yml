help:
  - '<#cba6f7><bold>Lootbox commands</bold>'
  - '<#6c7086>Paper 26.2 / Java 25 edition'
  - '<#a6e3a1>/lc info <#6c7086>- About Lootbox and its documentation'
  - '<#a6e3a1>/lc copy <#bac2de>\<source> \<destination> <#6c7086>- Copy one Lootbox into another'
  - '<#a6e3a1>/lc create <#bac2de>\<name> <#6c7086>- Create a Lootbox'
  - '<#a6e3a1>/lc edit <#bac2de>\<name> <#6c7086>- Open the editor'
  - '<#a6e3a1>/lc give <#bac2de>\<name> \<player> <#6c7086>- Give rolled Lootbox rewards'
  - '<#a6e3a1>/lc getname <#6c7086>- Identify the targeted Lootbox'
  - '<#a6e3a1>/lc help <#6c7086>- Show this help'
  - '<#a6e3a1>/lc despawn <#bac2de>\<name> <#6c7086>- Despawn a Lootbox'
  - '<#a6e3a1>/lc despawnall <#bac2de>[world] <#6c7086>- Despawn all Lootboxes'
  - '<#a6e3a1>/lc list <#6c7086>- List Lootboxes'
  - '<#a6e3a1>/lc locate <#6c7086>- Show Lootbox locations'
  - '<#a6e3a1>/lc maxfilledslots <#bac2de>\<name> \<number> <#6c7086>- Limit filled slots'
  - '<#a6e3a1>/lc randomspawn <#bac2de>\<name> \<radius> <#6c7086>- Configure random spawning'
  - '<#a6e3a1>/lc reload <#6c7086>- Reload and respawn all Lootboxes'
  - '<#a6e3a1>/lc remove <#bac2de>\<name> <#6c7086>- Delete a Lootbox'
  - '<#a6e3a1>/lc respawn <#bac2de>\<name> <#6c7086>- Force a respawn'
  - '<#a6e3a1>/lc respawnall <#bac2de>[world] <#6c7086>- Force all LootChests to respawn'
  - '<#a6e3a1>/lc setholo <#bac2de>\<name> \<text> <#6c7086>- Change hologram text'
  - '<#a6e3a1>/lc setpos <#bac2de>\<name> <#6c7086>- Move a LootChest'
  - '<#a6e3a1>/lc setprotection <#bac2de>\<name> \<seconds> <#6c7086>- Set spawn protection'
  - '<#a6e3a1>/lc settime <#bac2de>\<name> \<minutes> <#6c7086>- Set respawn time'
  - '<#a6e3a1>/lc tp <#bac2de>\<name> <#6c7086>- Teleport to a LootChest'
